<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>AI Table Maker</title>
</head>
<body>

<h1>AI Table Maker</h1>

<form method="POST" action="/confirm">

    <h3>テーブル名</h3>
    <input type="text" name="table_name" required>

    <h3>カラム1</h3>
    名前：<input type="text" name="col1_name" required>
    型：
    <select name="col1_type">
        <option value="TEXT">TEXT</option>
        <option value="INTEGER">INTEGER</option>
        <option value="BOOLEAN">BOOLEAN</option>
        <option value="DATE">DATE</option>
        <option value="TIMESTAMP">TIMESTAMP</option>
    </select>

    <h3>カラム2</h3>
    名前：<input type="text" name="col2_name" required>
    型：
    <select name="col2_type">
        <option value="TEXT">TEXT</option>
        <option value="INTEGER">INTEGER</option>
        <option value="BOOLEAN">BOOLEAN</option>
        <option value="DATE">DATE</option>
        <option value="TIMESTAMP">TIMESTAMP</option>
    </select>

    <h3>カラム3</h3>
    名前：<input type="text" name="col3_name" required>
    型：
    <select name="col3_type">
        <option value="TEXT">TEXT</option>
        <option value="INTEGER">INTEGER</option>
        <option value="BOOLEAN">BOOLEAN</option>
        <option value="DATE">DATE</option>
        <option value="TIMESTAMP">TIMESTAMP</option>
    </select>

    <br><br>
    <button type="submit">AIで確認</button>

</form>

<p>
    <a href="/tables">テーブル一覧を見る</a>
</p>

</body>
</html>
