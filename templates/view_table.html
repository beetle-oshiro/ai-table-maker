<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>{{ table_name }} の中身</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <div class="form-container">
      <h1>{{ table_name }} の中身</h1>

      {% if rows %}
      <div class="table-wrapper">
        <table class="custom-table">
          <thead>
            <tr>
              {% for col in columns %}
              <th>{{ col }}</th>
              {% endfor %}
            </tr>
          </thead>

          <tbody>
            {% for row in rows %}
            <tr>
              {% for value in row %}
              <td>{{ value }}</td>
              {% endfor %}
            </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
      {% else %}
      <div class="empty-box">
        <p>まだデータがありません。</p>
      </div>
      {% endif %}

      <div class="table-actions-bottom">
        <a href="/add/{{ table_name }}" class="main-btn">データを追加する</a>
        <a href="/tables" class="sub-btn">一覧に戻る</a>
        <a href="/" class="sub-btn">トップに戻る</a>
      </div>
    </div>
  </body>
</html>
