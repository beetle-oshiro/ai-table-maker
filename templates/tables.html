<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>テーブル一覧</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <div class="form-container">
      <h1>テーブル一覧</h1>

      <div class="table-list">
        {% for table in tables %}
        <div class="table-card">
          <div class="table-name">{{ table }}</div>

          <div class="table-actions">
            <a href="/view/{{ table }}" class="btn-secondary">見る</a>
            <a href="/add/{{ table }}" class="btn-secondary">追加</a>
          </div>
        </div>
        {% endfor %}
      </div>

      <p>
        <a href="/" class="back-link">← トップに戻る</a>
      </p>
    </div>
  </body>
</html>
