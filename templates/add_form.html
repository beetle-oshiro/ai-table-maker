<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>{{ table_name }} にデータ追加</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <div class="form-container">
      <h1>{{ table_name }} にデータ追加</h1>

      <form method="POST" action="/insert/{{ table_name }}">
        <div class="input-group-list">
          {% for col in columns %}
          <div class="input-group">
            <label>{{ col }}</label>
            <input type="text" name="{{ col }}" />
          </div>
          {% endfor %}
        </div>

        <button type="submit" class="submit-btn">登録する</button>
      </form>

      <div class="table-actions-bottom">
        <a href="/view/{{ table_name }}" class="sub-btn">一覧に戻る</a>
        <a href="/tables" class="sub-btn">テーブル一覧</a>
      </div>
    </div>
  </body>
</html>
