<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>登録完了</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <div class="form-container">
      <h1>登録完了</h1>

      <div class="complete-box">
        <p class="complete-text">
          「<span class="table-name-highlight">{{ table_name }}</span
          >」にデータを登録しました！
        </p>
      </div>

      <div class="complete-actions">
        <a href="/view/{{ table_name }}" class="main-btn">一覧を見る</a>
        <a href="/add/{{ table_name }}" class="sub-btn">続けて登録する</a>
        <a href="/" class="sub-btn">トップに戻る</a>
      </div>
    </div>
  </body>
</html>
